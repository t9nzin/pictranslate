<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>PicTranslate</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1>PicTranslate</h1>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <div class="status" id="status">
      <span class="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>

    <div class="section">
      <label class="label" for="target-lang">Translate to</label>
      <select id="target-lang" class="select">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="zh">Chinese (Simplified)</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="ar">Arabic</option>
      </select>
    </div>

    <button class="btn" id="translate-page">Translate Images on Page</button>

    <footer class="footer">
      <span class="footer-note">Free — no API keys needed</span>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
